<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Detaljer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            text-align: center;
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 20px;
        }
        .poster img {
            max-width: 300px;
            height: auto;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }
        .poster img:hover {
            transform: scale(1.05);
        }
        .details {
            margin-top: 20px;
        }
        .details p {
            font-size: 1.2em;
            line-height: 1.5;
            margin: 10px 0;
        }
        .highlight {
            color: #ffcc00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Film Detaljer</h1>
    <div class="poster" id="moviePoster">
    </div>
    <div class="details">
        <h2 id="movieTitle"></h2>
        <p id="movieYear"></p>
        <p id="moviePlot"></p>
        <p id="movieLength"></p>
        <p><span class="highlight">IMDB Rating:</span> <span id="movieRating"></span></p>
    </div>
</div>

<script>
    // Fetch a single movie based on its ID
    const movie_id = '5';
    fetch(`http://localhost:8080/movie/${movie_id}`)
        .then(response => response.json())
        .then(movie => {

            document.getElementById('moviePoster').innerHTML = `
                <img src="${movie.poster}" alt="${movie.title} Plakat">
            `;

            document.getElementById('movieTitle').innerText = movie.title;
            document.getElementById('movieYear').innerText = `Udgivelsesår: ${movie.year}`;
            document.getElementById('movieLength').innerText = `Runtime: ${movie.runtime}`;
            document.getElementById('movieRating').innerText = movie.imdbRating;
        })
        .catch(error => console.error('Fejl ved hentning af filmen:', error));
</script>

</body>
</html>
